<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GM monogram v2 night blue</title>
  <desc id="desc">Clear minimal GM monogram for Giacomo Mariuzza, using a readable geometric G around a precise M.</desc>
  <rect width="512" height="512" rx="96" fill="#0F1724"/>
  <g fill="none" stroke="#F4EFE7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clear geometric G -->
    <path d="M358 156
             A142 142 0 1 0 358 356" stroke-width="36"/>
    <path d="M358 256 H292" stroke-width="36"/>

    <!-- More readable integrated M -->
    <path d="M164 344 V192
             L256 306
             L348 192
             V344" stroke-width="34"/>
  </g>
</svg>
