<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>GM logo icon</title>
  <style>
    .dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark { display: block; }
    }
  </style>
  <image class="light" href="favicon-light.png" width="512" height="512" />
  <image class="dark" href="favicon-dark.png" width="512" height="512" />
</svg>
